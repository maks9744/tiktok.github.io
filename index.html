<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800;900&display=swap" rel="stylesheet">

<style>
body {
    margin:0;
    background:black;
    font-family:'Montserrat', sans-serif;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container {
    text-align:center;
}

.number {
    font-size:160px;
    font-weight:900;
    letter-spacing:3px;
    text-shadow:
        0 0 10px rgba(255,255,255,0.6),
        0 0 25px rgba(255,255,255,0.3);
    transition: transform 0.3s ease, opacity 0.3s ease, color 0.3s ease;
}

.middle {
    font-size:55px;
    font-weight:900;
    letter-spacing:6px;
    margin:15px 0 10px 0;
    opacity:0.9;
}

.line {
    width:240px;
    height:4px;
    background:white;
    margin:10px auto 20px auto;
    opacity:0.7;
    box-shadow: 0 0 10px rgba(255,255,255,0.5);
}

.animate {
    transform: scale(1.25);
    opacity:0.6;
}

/* Красный при уменьшении */
.decrease {
    color: #ff2b2b;
    text-shadow:
        0 0 10px rgba(255,0,0,0.9),
        0 0 25px rgba(255,0,0,0.6);
}
</style>
</head>

<body>

<div class="container">

<div id="wins" class="number">0</div>

<div class="middle">WIN</div>
<div class="line"></div>

<div id="target" class="number">0</div>

</div>

<!-- Звуки -->
<audio id="soundUp" src="up.mp3" preload="auto"></audio>
<audio id="soundDown" src="down.mp3" preload="auto"></audio>

<script>

let winsEl = document.getElementById("wins");
let targetEl = document.getElementById("target");

let soundUp = document.getElementById("soundUp");
let soundDown = document.getElementById("soundDown");

let lastWins = -1;
let ws = null;

function animateChange(el) {
    el.classList.add("animate");
    setTimeout(() => el.classList.remove("animate"), 300);
}

function connectWS() {

    console.log("Connecting WS...");

    ws = new WebSocket("ws://127.0.0.1:8086/");

    ws.onopen = () => {
        console.log("WS Connected");
    };

    ws.onmessage = (event) => {

        let j = JSON.parse(event.data);

        if (j.wins !== undefined) {

            let newWins = parseInt(j.wins);

            if (newWins != lastWins) {

                if (lastWins !== -1) {

                    // УВЕЛИЧЕНИЕ
                    if (newWins > lastWins) {
                        soundUp.currentTime = 0;
                        soundUp.play().catch(()=>{});
                    }

                    // УМЕНЬШЕНИЕ
                    if (newWins < lastWins) {

                        winsEl.classList.add("decrease");

                        soundDown.currentTime = 0;
                        soundDown.play().catch(()=>{});

                        setTimeout(() => {
                            winsEl.classList.remove("decrease");
                        }, 1000);
                    }
                }

                winsEl.innerText = newWins;
                animateChange(winsEl);
                lastWins = newWins;
            }
        }

        if (j.target !== undefined) {
            targetEl.innerText = j.target;
        }
    };

    ws.onerror = (e) => {
        console.log("WS Error", e);
    };

    ws.onclose = () => {
        console.log("WS Disconnected. Reconnecting in 2s...");
        setTimeout(connectWS, 2000);
    };
}

// первый запуск
connectWS();

</script>

</body>
</html>
